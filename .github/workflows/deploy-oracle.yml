name: deploy-oracle

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-oracle-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script_stop: true
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            cd /opt/ems
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Run the single hardened deploy path (migrate/static/build/services)
            # as the deploy user so script ownership logic keeps repo writable.
            if [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
              VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} bash deploy.sh --quick
            else
              bash deploy.sh --quick
            fi

            echo "✅ Oracle deployment completed"
