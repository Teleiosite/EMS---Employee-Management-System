name: deploy-oracle

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-oracle-main
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.ORACLE_VM_HOST != '' && secrets.ORACLE_VM_USER != '' && secrets.ORACLE_VM_SSH_KEY != '' && secrets.VITE_API_BASE_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script_stop: true
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            cd /opt/ems
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            cd /opt/ems/ems-backend
            source venv/bin/activate
            python manage.py migrate --settings=ems_core.settings.production --noinput
            python manage.py collectstatic --settings=ems_core.settings.production --noinput

            cd /opt/ems
            npm ci --legacy-peer-deps
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} npm run build
            sudo cp -r dist/* /opt/ems/frontend/

            sudo systemctl restart ems-gunicorn
            sudo systemctl restart nginx
            echo "✅ Oracle deployment completed"
